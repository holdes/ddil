# DDIL Kit — Framework Desktop (192.168.1.10)
# Presentation layer: app + CPU ES data node + Kibana
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Wipe:   docker compose down -v
#
# Prereq: sudo sysctl -w vm.max_map_count=262144

services:
  # ── Elasticsearch CPU Data Node ────────────────────────────
  # Joins the ddil-vineyard cluster as the CPU-only data node
  es-cpu:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: es-cpu
    environment:
      - cluster.name=ddil-vineyard
      - node.name=framework-cpu
      - node.attr.accel=cpu
      - discovery.seed_hosts=192.168.1.20:9300
      - cluster.initial_master_nodes=spark-gpu,framework-cpu
      - network.publish_host=192.168.1.10
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=trial
      - vectors.indexing.use_gpu=false
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms8g -Xmx8g"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-cpu-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  # ── Kibana ─────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.1
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://es-cpu:9200
      - ELASTICSEARCH_SSL_VERIFICATIONMODE=none
      - SERVER_HOST=0.0.0.0
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=ddil-vineyard-demo-kit-32char-key!
      - XPACK_SECURITY_ENCRYPTIONKEY=ddil-vineyard-demo-kit-32char-key!
      - XPACK_REPORTING_ENCRYPTIONKEY=ddil-vineyard-demo-kit-32char-key!
    ports:
      - "5601:5601"
    depends_on:
      - es-cpu
    restart: unless-stopped

  # ── Backend API ────────────────────────────────────────────
  # FastAPI — orchestrates search, RAG, race, agentic pipeline
  backend:
    build:
      context: ./backend
    container_name: backend
    environment:
      - VINEYARD_ES_MAIN_URL=http://es-cpu:9200
      - VINEYARD_ES_GPU_URL=http://192.168.1.20:9200
      - VINEYARD_DGX_SPARK_HOST=192.168.1.20
      - VINEYARD_OLLAMA_EMBED_URL=http://192.168.1.20:11434
      - VINEYARD_OLLAMA_LLM_URL=http://192.168.1.20:11434
      - VINEYARD_DATA_DIR=/data
    ports:
      - "8000:8000"
    volumes:
      - ./data/preprocessed:/data:ro
      - ./data/tiles:/tiles:ro
    depends_on:
      - es-cpu
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────────
  # React + Vite dev server — proxies /api to backend
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  es-cpu-data:
